# Nginx reverse proxy for Odoo — AI Employee Platinum Tier
# Place at: /etc/nginx/sites-available/odoo
# Symlink:  ln -s /etc/nginx/sites-available/odoo /etc/nginx/sites-enabled/odoo
# SSL:      certbot --nginx -d yourdomain.com

upstream odoo_backend {
    server 127.0.0.1:8069;
}

upstream odoo_longpolling {
    server 127.0.0.1:8071;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;   # Replace _ with your domain
    return 301 https://$host$request_uri;
}

# HTTPS — main Odoo proxy
server {
    listen 443 ssl http2;
    server_name _;   # Replace _ with your domain

    # SSL certs (managed by certbot or add manually)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Proxy settings
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;

    # Main app
    location / {
        proxy_redirect off;
        proxy_pass http://odoo_backend;
    }

    # Long polling (live chat / notifications)
    location /longpolling {
        proxy_pass http://odoo_longpolling;
    }

    # Static files served directly
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo_backend;
    }

    # Health check endpoint
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
